<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Kelola Produk – GreenSeed Admin</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body class="admin-body">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-brand">
          <span class="logo">🌱</span> GreenSeed
          <span style="font-size: 0.7rem; opacity: 0.8">Admin</span>
        </div>
        <nav class="sidebar-nav">
          <a href="dashboard.html" class="sidebar-link">📊 Dashboard</a>
          <a href="products.html" class="sidebar-link active">🌿 Produk</a>
          <a href="orders.html" class="sidebar-link">📦 Pesanan</a>
        </nav>
        <div class="sidebar-footer">
          <button
            onclick="logout()"
            class="btn btn-outline-white btn-sm w-full"
          >
            Keluar
          </button>
        </div>
      </aside>

      <div class="admin-content">
        <div class="admin-topbar">
          <h2>Kelola Produk</h2>
          <button class="btn btn-success" onclick="openAddModal()">
            + Tambah Produk
          </button>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Gambar</th>
                    <th>Nama</th>
                    <th>Jenis</th>
                    <th>Harga</th>
                    <th>Stok</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody id="products-tbody">
                  <tr>
                    <td colspan="7" class="text-center text-muted">
                      Memuat...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Add/Edit Product -->
    <div id="product-modal" class="modal-overlay" style="display: none">
      <div class="modal-card">
        <div class="modal-header">
          <h3 id="modal-title">Tambah Produk</h3>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <form id="product-form" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Nama Bibit *</label>
              <input
                id="f-nama"
                name="nama_bibit"
                type="text"
                class="form-control"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Jenis Tanaman *</label>
              <select
                id="f-jenis"
                name="jenis_tanaman"
                class="form-control"
                required
              >
                <option value="">-- Pilih Jenis --</option>
                <option>Bunga</option>
                <option>Buah</option>
                <option>Sayuran</option>
                <option>Herbal</option>
                <option>Pohon</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Harga (Rp) *</label>
              <input
                id="f-harga"
                name="harga"
                type="number"
                min="0"
                class="form-control"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Stok *</label>
              <input
                id="f-stok"
                name="stok"
                type="number"
                min="0"
                class="form-control"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Deskripsi</label>
            <textarea
              id="f-desc"
              name="deskripsi"
              class="form-control"
              rows="3"
            ></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Gambar (jpg/png/webp, max 2MB)</label>
            <input
              id="img-file"
              name="gambar"
              type="file"
              accept="image/jpeg,image/png,image/webp"
              class="form-control"
            />
            <img
              id="img-preview"
              src=""
              alt="Preview"
              style="
                display: none;
                margin-top: 0.5rem;
                max-width: 200px;
                border-radius: 8px;
              "
            />
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline"
              onclick="closeModal()"
            >
              Batal
            </button>
            <button type="submit" id="save-btn" class="btn btn-success">
              Simpan
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="toasts"></div>
    <script src="../../js/api.js"></script>
    <script src="../../js/admin/products.js"></script>
  </body>
</html>
