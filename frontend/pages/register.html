<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Daftar – GreenSeed</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="auth-page">
    <nav class="navbar">
      <a href="/index.html" class="navbar-brand"
        ><span class="logo">🌱</span> GreenSeed</a
      >
      <div class="navbar-right" id="nav-right"></div>
    </nav>
    <main class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">🌱</div>
        <h1 class="auth-title">Buat Akun GreenSeed</h1>
        <p class="auth-sub">
          Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </p>
        <form id="register-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="nama">Nama Lengkap</label>
            <input
              id="nama"
              name="nama"
              type="text"
              class="form-control"
              placeholder="John Doe"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              class="form-control"
              placeholder="nama@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              class="form-control"
              placeholder="Min. 6 karakter"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm">Konfirmasi Password</label>
            <input
              id="confirm"
              name="confirm"
              type="password"
              class="form-control"
              placeholder="Ulangi password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-success w-full"
            style="margin-top: 0.5rem"
          >
            Daftar
          </button>
        </form>
      </div>
    </main>
    <div id="toasts"></div>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
